# voices.yml — machine-readable Watchlist for the `scout` sweep (intake pipeline, issue #28).
#
# ILLUSTRATIVE REFERENCE — NOT part of the Generic Baseline guarantee. This is curated content a
# Host App is expected to replace or extend during Customization; only the *schema* (the field
# legend below) is business-neutral mechanism. Placement is ratified in ADR 0012
# (docs/adr/0012-intake-pipeline-placement.md). See docs/reference/README.md for the label rationale.
#
# Schema (per entry):
#   name     : display name (or org/channel name)
#   tier     : core | trend | frontier-lab | balance | org | community
#   focus    : one-line why-we-watch
#   handles  : { site, x, youtube, github }   # any may be null
#   feeds    : [ URLs the sweep polls: RSS/Atom/YouTube/Substack ]   # [] = unresolved (TODO), never invented
#   cadence  : high | medium | low            # expected publish rate -> sweep frequency
#   verified : YYYY-MM-DD                      # last time handles were checked (a YAML date; load with permitted_classes: [Date])
#   status   : active | in-flux | dormant
#
# Invariants (enforced by test/voices_watchlist_test.rb):
#   - every entry carries a non-empty `verified` and `status`
#   - `status` and `tier` stay within the sets above
#   - every element of a non-empty `feeds` list is a real URL — an unresolved feed stays `[]`, never a
#     placeholder string. No feed URL is invented; where none is known the list is empty with a `# TODO` note.
#
# Feed notes (as of 2026-07-07 sweep):
#   - Feeds are an OPTIMIZATION, not a requirement: where `feeds` is `[]`, the `scout` skill falls back
#     to WebSearch/WebFetch against `handles`. An unresolved feed is surfaced as staleness, never faked.
#   - X (Twitter) exposes no free/public feed since 2023, and consumer X Premium grants no API access —
#     so X-only voices stay `feeds: []` and are swept via handle search (or a future manual-drop inbox).
#   - YouTube feeds use the public per-channel endpoint (…/feeds/videos.xml?channel_id=UC…); no key needed.

