name: parity

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # No bundler: the checker and its self-test are stdlib-only (ADR 0008).
          bundler-cache: false

      # The bundle's own self-tests live in test/, which ai-config-sync deliberately never vendors
      # into a Host App (usage guide §1). Each step below is gated on the EXACT file it runs — a
      # repo-only sentinel — never on `test/` existing: a Host App may own an unrelated test/ tree
      # of its own, and a directory-presence gate would send it hunting for un-vendored bundle
      # files (issue #95; sentinel refinement from the Codex review on PR #101). In this repo the
      # self-tests run; in a vendored copy each step skips because its sentinel file is absent.
      - name: Parity self-test (proves the checker fails correctly)
        if: ${{ hashFiles('test/parity_check_test.rb') != '' }}
        run: ruby test/parity_check_test.rb

      - name: Sync self-test (proves the vendoring installer works)
        if: ${{ hashFiles('test/ai_config_sync_test.rb') != '' }}
        run: ruby test/ai_config_sync_test.rb

      - name: Protected-branch extractor self-test
        if: ${{ hashFiles('test/protected_branches_test.rb') != '' }}
        run: ruby test/protected_branches_test.rb

      - name: Human-gate extractor self-test
        if: ${{ hashFiles('test/human_gates_test.rb') != '' }}
        run: ruby test/human_gates_test.rb

      - name: Reviewer extractor self-test
        if: ${{ hashFiles('test/reviewer_test.rb') != '' }}
        run: ruby test/reviewer_test.rb

      - name: Watchlist data-contract self-test (voices.yml schema)
        if: ${{ hashFiles('test/voices_watchlist_test.rb') != '' }}
        run: ruby test/voices_watchlist_test.rb

      - name: Roster parity self-test (prose doc <-> voices.yml)
        if: ${{ hashFiles('test/voices_roster_parity_test.rb') != '' }}
        run: ruby test/voices_roster_parity_test.rb

      - name: Tool Roster data-contract self-test (tool-roster.yml schema)
        if: ${{ hashFiles('test/tool_roster_test.rb') != '' }}
        run: ruby test/tool_roster_test.rb

      - name: Guard self-test (Layer 2 git-hook guard)
        if: ${{ hashFiles('test/guard_protected_branch.test.sh') != '' }}
        run: bash test/guard_protected_branch.test.sh

      - name: Enforce-hook self-test (Layer 3 Claude fast-fail; needs jq)
        run: bash .claude/hooks/enforce-branch-creation.test.sh

      - name: Structural parity check
        run: ruby scripts/parity_check.rb
